<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oracle 2.0 | Панель Управления</title>
    <style>
        :root {
            --neon-pink: #ff0055;
            --neon-cyan: #00ffcc;
            --bg-dark: #0a0a12;
            --panel-bg: #121225;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--neon-cyan);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 90vh;
            margin: 0;
        }

        .oracle-panel {
            background: var(--panel-bg);
            border: 2px solid var(--neon-pink);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 0 25px rgba(255, 0, 85, 0.3);
            max-width: 550px;
            width: 100%;
            box-sizing: border-box;
        }

        h2 {
            color: #ffffff;
            text-shadow: 0 0 15px var(--neon-pink);
            margin-top: 0;
            text-align: center;
            letter-spacing: 2px;
            border-bottom: 2px dashed var(--neon-pink);
            padding-bottom: 15px;
        }

        h3 {
            color: #ffffff;
            margin-top: 25px;
            text-shadow: 0 0 8px var(--neon-cyan);
            font-size: 1.1rem;
        }

        .setting-item {
            display: flex;
            justify-content: space-between;
            margin: 20px 0;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            padding: 10px 15px;
            border-radius: 8px;
            border-left: 3px solid var(--neon-cyan);
        }

        .status-text {
            font-weight: bold;
            color: #ffffff;
        }

        .btn {
            background: var(--neon-pink);
            color: #ffffff;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(255, 0, 85, 0.5);
        }

        .btn:hover {
            background: var(--neon-cyan);
            color: #000000;
            box-shadow: 0 0 15px var(--neon-cyan);
        }

        .pack-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .pack-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 255, 204, 0.05);
            padding: 12px 15px;
            border-radius: 8px;
            border: 1px solid rgba(0, 255, 204, 0.2);
        }

        .pack-link {
            background: #ffff00;
            color: #000000;
            text-decoration: none;
            font-weight: bold;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.85rem;
            transition: all 0.2s ease;
        }

        .pack-link:hover {
            background: #ffffff;
            box-shadow: 0 0 10px #ffff00;
            transform: scale(1.05);
        }

        #log-console {
            background: #000000;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            font-size: 0.8rem;
            padding: 10px;
            border-radius: 6px;
            margin-top: 20px;
            height: 60px;
            overflow-y: auto;
            border: 1px solid #333;
        }
    </style>
</head>
<body>

<div class="oracle-panel">
    <h2>⚙️ ЯДРО ORACLE v2.0</h2>
    
    <div class="setting-item">
        <div>
            <span class="status-text">🤖 Режим AI Reader:</span><br>
            <small style="color: #888;">Превращение Microsoft в порошок</small>
        </div>
        <button class="btn" id="readerBtn" onclick="toggleReader()">ЗАГРУЗКА...</button>
    </div>

    <h3>📦 АРХИВ ПАКОВ (ИМПОРТ ИЗ ORACLE 1.1)</h3>
    <div class="pack-container">
        <div class="pack-item">
            <span>🪐 Космо-Пак v1.1</span>
            <a href="https://raw.githubusercontent.com/ТВОЙ_ГИТХАБ_НИК/ТВОЙ_РЕПОЗИТОРИЙ/main/packs/kosmo_pack.mcpack" class="pack-link">УСТАНОВИТЬ</a>
        </div>
        <div class="pack-item">
            <span>🛡️ Защитный Щит SUXI v1.1</span>
            <a href="https://raw.githubusercontent.com/ТВОЙ_ГИТХАБ_НИК/ТВОЙ_РЕПОЗИТОРИЙ/main/packs/suxi_shield.mcpack" class="pack-link">УСТАНОВИТЬ</a>
        </div>
    </div>

    <div id="log-console">Initialization... Connecting to 12th Empire Net...</div>
</div>

<script>
    // ТВОЙ ДЕПЛОЙ-URL ИЗ GOOGLE APPS SCRIPT:
    const ORACLE_API = "https://script.google.com/macros/s/AKfycbwh3dasXF3yxaF9ZrFnz15x1pXhMY4IAswpdI3reqvJ48AHqB2tBBuYa_U-huYbzustkg/exec";
    const USER_ID = "Sam_Chief_Engineer"; // Твой ID аккаунта в системе

    let readerMode = true;

    function printLog(text) {
        const consoleEl = document.getElementById('log-console');
        consoleEl.innerHTML += `<br>> ${text}`;
        consoleEl.scrollTop = consoleEl.scrollHeight;
    }

    // Подгрузка настроек из Google Script при старте
    async function loadSettings() {
        printLog("Запрос конфигурации к Google Apps Script...");
        try {
            let response = await fetch(`${ORACLE_API}?action=getSettings&userId=${USER_ID}`);
            let data = await response.json();
            
            readerMode = data.readerMode;
            updateUI();
            printLog("Данные аккаунта синхронизированы! Ядро стабильно.");
        } catch (err) {
            printLog("Ошибка сети. Включен автономный режим ядра.");
            // Если сеть легла, ставим дефолт, чтобы панель работала автономно
            readerMode = true;
            updateUI();
        }
    }

    function updateUI() {
        const btn = document.getElementById('readerBtn');
        btn.innerText = readerMode ? "ВКЛЮЧЕН" : "ВЫКЛЮЧЕН";
        btn.style.background = readerMode ? "#ff0055" : "#555";
        btn.style.boxShadow = readerMode ? "0 0 10px rgba(255, 0, 85, 0.5)" : "none";
    }

    // Переключение режима и отправка POST-запроса в базу скрипта
    async function toggleReader() {
        readerMode = !readerMode;
        updateUI();
        printLog(`Режим Reader изменен на: ${readerMode ? "ВКЛ" : "ВЫКЛ"}`);

        try {
            printLog("Отправка пакета данных в ScriptProperties...");
            await fetch(ORACLE_API, {
                method: "POST",
                mode: "no-cors", // Важно для работы с CORS политикой редиректов Google
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    userId: USER_ID,
                    settings: {
                        readerMode: readerMode,
                        oracle11_packs: ["kosmo_pack_v1.1", "suxi_shield_v1.1"],
                        status: "Synced_v2"
                    }
                })
            });
            printLog("Успешно записано в облако Оракула!");
        } catch (err) {
            printLog("Ошибка отправки! Запись сохранена локально.");
        }
    }

    // Старт системы
    window.onload = loadSettings;
</script>
</body>
</html>
